body:
  text: 登仕郎河中府知事訥齋張輅纂集補譔先生名摶字圖南亳州貞源人幼歲戲渴水一作渦水一青衣媪抱置懷中乳之曰令汝更無嗜欲聰悟過人青衣媪者疑辰星之精及長習舉業後唐長興中試進士不第隱居武當山九室巖辟穀鍊氣二十餘年或傳夜靜焚香讀易有五老人至厖眉皓髮容貌古怪常來聽誦居日乆摶問之老人對曰吾儕即兹山日月池龍也此間玄武據臨之地華山是先生棲隱之所也異日希夷默坐五龍忽詣令先生閉目凌空馭風終宵至華山置坐於盤石之上開目視之不見五老人去向或云睡法即龍教也龍善睡故云多閉門不出獨坐至百餘日不起周世宗召至闕下令於禁中扃户以試之月餘始開熟寢如故始異之因問以黃白之術摶曰陛下爲天下君當以蒼生爲念豈宜留意於此乎世宗不悅放還山賜號白雲先生令長史歲時存問先生負經濟才初五代間自晋漢之際每聞一朝革命輒顰蹙數日人有問者瞪目不答先生攬鏡自照曰非仙而即帝其自任如此宋太祖與趙普遊長安希夷逢之笑而墮驢曰眞人亦在世矣輒握太祖之手曰可市飲乎太祖曰可與趙學究同往希夷睥睨普曰也得也得相隨入酒肆普坐席左摶怒一手引之曰紫徴帝垣一小星輒據上次可乎斥之使居席右已知帝王有徴矣後先生引惡少數百入汴州中路聞太祖登極驚喜大笑問其故又大笑曰自此定矣詩曰齁齁四十年來睡不覺東方曰已明先生即入華山隱居爲道士宋太祖累徴不至及太祖崩太宗即位至道元年四月十日帝坐垂拱殿時和歲稔化理均平聞先生之名乆矣厭紛華之世喜清淨之教差殿東頭供奉官陳宗顔爲使齎昭書並御詩往華州華陰縣華山雲臺觀宣陳圖南先生至四月十四日抵華陰縣縣宰著作郎丁壽明迎接入縣時薄暮止宿焉來曉同天使四月望日至雲臺觀與道士鍾希晦相見引導見先生報曰皇帝宣師父先生盥手焚香拜禮畢聽詔曰朕自即位以來克服八方威臨萬國遐邇悉歸於皇化華夷亦致於隆平知卿抱道山中洗心物外養太素浩然之氣應上界少微之星節配巢由道遵黄老懷經綸之長策不謁王侯藴將相之竒才未朝天子卿不屈於萬乗身奚隱於三峰乗風猶來舉朝稱賀御詩曰華嶽多聞說知卿是姓陳雲間三島客物外一高人丹鼎爲活計青山作近鄰朕思親欲往社稷去無因先生聽罷詔書並詩對天使曰貧道棲眞物外修鍊山間無意求名有心慕道不願仕也待天使禮畢未肯來朝即答回表並詩云伏念山野生居吴地長自漢南成童以習業儒林壯歲而徧遊洞府性同猨鳥心若土灰不曉仁義之淺深安識行藏之去就敗荷作服脱籜爲冠體有青毛足無草履有意慕羲軒之道無心誦管樂之篇南華道德頻看黄閣玉堂絶念數行紫詔徒煩彩鳳銜來一片閑心已被白雲留住苟臨軒陛貽笑聖明詩曰九重特降紫泥宣才拙深居樂靜縁山色滿庭供晝障松聲萬壑即琴絃無心享禄登台鼎有意求仙到洞天軒冕浮榮絶念慮三峰只乞睡千年使見先生堅意不肯應召得回表並詩於四月二十四日至京師進呈於紫宸殿太宗讀表與詩畢知先生不來甚弗悅念念不已即當年六月三日帝坐垂拱殿召殿東頭供奉官張素眞齎詔書再往宣先生至六月八日到華山雲臺觀見山童擁筠箒而立天使問曰師父在否山童曰師父於庵中熟睡正濃使臣曰何以得覺山童曰擊頭邊金鐘便覺擊之即悟先生知天使至忙起整道服問使臣曰何故復來答曰皇帝爲陳宗顔宣先生弗至甚爲失望特遺吾再來召先生焚香禮畢聽讀詔曰朕伏惟先生白雲隱士碧洞高人悟大道之玄門達希夷之奥理朕歎韶光甚速迅景難留忽暑往以寒催漸顔衰而鬢改雖達治世之略未諳鍊性之機廢寢忘餐思賢若渴暫離洞府跨鸞鶴以飛來伫立宫闈列簪纓以敬待先生讀罷詔書答使臣曰貧道山野之人鹿豕同群登高望遠臨流漱齒松君桂父吾之友也雲峰霞嶺吾所遊也熟羡浮榮之富貴哉請天使暫停軒轡止歇山庵作回表並詩以謝殊渥表云伏念愚拙深潜澗壑誤蒙天恩臣無諸葛之竒才君邁漢皇之厚德臣山麋之性野鶴之姿冠簪獨羡乎逍遥軒冕離禁乎羈束高卧蒼龍之嶺蝶夢悠揚閑看玉井之蓮詩魂浩湯餐烟霞於洞口採薇蕨於林間杖屨徜徉身心懶散鍊爐中之丹藥遠擬登仙避世上之虚名屢防嫁禍賴遭逢乎堯舜可疏放其巢由幸盡餘生遐瞻聖代詩二絶云坐逢聖代即堯年草澤愚人也被宣自笑形骸元懶散才踈安敢望朝天調和四氣憑燒藥修鍊千方只要安黄閣高官無意戀閑居佳境勝爲官使臣得回表並詩力不能强起至六月十六日至京師進呈文德殿下太宗讀罷表並詩宣先生不至龍顔大不樂即當年六月二十九日帝坐垂拱殿宣内都知石寳問曰百官中有誰言辨者寳奏曰有内藏庫副使葛守中能言太宗宣至令守中爲使再宣希夷先生齎詔書並御詩往雲臺觀七月七日到觀不見先生有知觀道人楊子遵言先生恐皇帝再來宣上玉泉觀遁逃坐靜去了使臣俾子遵前導歷确石徑至觀所報先生接詔迎使焚香禮畢聽讀詔曰朕上承天命下撫民心兵消而四海咸寧化行而八方無詘位臨有衆含哺鼓腹以同歌道體無爲鑿井耕田以安業知大賢之生世海晏河清望君子以救時風行草偃身未離於巖壑名滿寰區志恒想於蓬瀛心遊寥廓朕素知軒后博施之德實歉廣成修養之方地僻雖深王澤所及伊尹就徴而適亳孟軻隨聘以至梁命有相從禮無多讓御詩曰三度宣卿不赴朝關河千里莫辭勞鑿山選玉終須得點鐵成金未見燒紫袍綽綽宜披體金印纍纍可掛腰朕賴先生相輔佐何憂萬姓輟歌謡先生讀罷詔並詩意懶赴徴騁言復辭謝天使守中曰宣命三次先生不可固辭豈不聞魯論云君命召不俟駕行矣詔㫖豈宜抗拒又鄒書云率土之濱莫非王臣不可辭也僕雖不才爲先生賦詩一首詩曰華嶽三峰客幽居不記年烟霞爲活計雲水作家縁種藥茅亭畔栽松澗壑邊暫離仙洞去可應帝王宣先生讀罷其喜隨答詩曰鶴氅翩翩即散仙蒲輪爭忍利名牽留連華嶽傷心别回顧雲臺望眼穿涉世風波眞險惡忘機鷗鳥自悠然三峯纔欲和衣倒又被天書下日邊先生賦詩畢與使者同行留别山中麻衣道友詩一絶華嶽峰前兩路分數間茅屋一溪雲師言耳聵持知乆人是人非聞未聞麻衣道者答詩曰獨坐茅庵迥出塵亦無主鉢日隨身逢人不話人間事便是人間無事人先生得詩默喻其㫖相别訖與天使不乆至京師於建隆觀安歇夜寢偶聞禁鐘響吟嘆世詩二絶千門萬户鎖重關星斗排空靜悄然塵世是非方欲歇六街禁鼓漏初傳銀河斜轉夜將闌枕上人心筭未閑堪嘆市廛名利者多應牽役夢魂間先生睡至五更聞曉鐘響復吟詩曰玉漏將殘月色沉一聲清響透寒音能催野客思鄉切暗送離人起恨深窗下驚開名利眼枕前喚覺是非心皇王帝霸皆經此歷代興亡直至今先生賦詩畢盥漱巾櫛時已昧爽令使臣先入内奏言先生宣來見帝帝急命宣至闕下見於延英殿先生服羽衣戴華陽巾草履垂絛以賔禮見賜坐上賦詩問曰知卿得道數餘年鎮日常吞幾粒丹可訝鬢邊無白髮還疑險上有紅顔終宵寢向何方觀清曉齋登甚處壇肯爲眇躬傳妙訣寡人擬欲似卿閑先生答詩曰臣今得道幾經年每日常吞二氣丹仙釀飲時添漆鬢蟠桃食後注童顔夜深口宿雲臺觀曉起齋登法籙壇陛下問臣修養法華山深處可清閑太宗覽先生所答詩大悅時上方欲征河東先生諫止之會軍已興命先生寢於御園兵還果無功睡百餘日方起帝驚異加號恩禮特厚太宗從容謂希夷曰先兄太祖功高德厚宣先生弗至寡從功卑德薄煩先生降臨丹陛摶曰先帝不須貧道來陛下不免臣一遭耳太宗又問曰昔在堯舜之爲天下今可致否對曰堯舜土階三尺茅茨不剪其跡似不可及然能以清靜爲治即今之堯舜也上善之太宗多延入宫中與語謂宰相宋琪曰陳摶獨善其身不干勢利眞方外之士遣中使送至中書琪等問曰先生得玄默修養之道可以授人乎曰摶遁跡山野無用於世修鍊之事不知無所傳授然設使白日飛昇何益於治聖上龍顔秀異有天人之表洞達古今治亂之㫖眞有道仁聖之君正是君臣合德以治天下勤行修鍊無以加此琪等表上其言上覽甚喜先生以鶴書赴隴野服來廷太宗喜其拔俗之標待以不臣之禮處之直館幽延西清靡勞襄野之遊自契崆峒之問八素九眞之要訣四覺七縁之妙門故其造膝沃心之㫖莫得而聞也太宗命先生相眞宗即壽王也太宗八子眞宗第三使左右引導至東宫王未起而迴帝問之先生曰王門厮養皆將相王可知矣所見乃張相耆楊相崇勳郭大尉承祐也先生被召至闕下聞有士大夫詣其所止願聞善言以自規摶曰得便宜事不可再去優游之所勿乆戀得志之地勿再往聞者以爲至言康節詩曰珍重至人留好語得便宜是落便宜太宗暇日與先生同登東角樓閑觀市肆見樓下富人日高纔起洗潄問左右是誰之家或奏曰此東京豪富民耳即吟詩曰人人未起朕先起朝來萬事攢心裏可羡東京豪富民睡至日高猶未起先生答詩曰昨夜三更夢裏驚一聲鐘響萬人行多應又是朝金闕臣自無官睡到明太宗見先生所答詩大喜來日早朝上欲以爲諫議大夫先生堅辭不受乃作退官歌並詩一絶歌曰道能清道能靜清靜之中求正定不貪不愛任浮生不學愚迷多慳恪時人笑臣不求官官是人間一大病官卑又被人管轄官高亦有人趨佞或經秦或經鄭東來西去似繩矧直至百年不曾歇筭來爭似臣清靜月爲燈水爲鏡長柄葫蘆作氣命出入雖無從者扶左有金龜右鶴引朝日醉長不醒每每又被天書請時人見臣筆呵呵臣自心中别有景又詩曰元氣充餐草結衣等閑無事下山稀不侵織女耕夫利猶自傍人說是非太宗見先生堅意不肯就官禄問先生有濟世安民良策留之可也希夷曰臣總角慕道壯歲遊山處心澹泊默悟玄風濟世良策未暇知也臣頗好睡幸放還山可也隨賦辭職嘆世詩一首云南辰北斗夜頻移日出扶桑又落西人世輕飄眞野馬名場爭擾似醢鷄松篁鬱鬱冬猶秀桃李紛紛春漸迷識破邯鄲塵世夢白雲深處可幽棲太宗曰寡人召卿來方期陰陽燮理朝綱整治安國家濟人民不意先生只說山中之樂惟睡爲念信有說乎先生曰然進睡歌一首云臣愛睡臣愛睡不卧氈不蓋被片石枕頭簑衣覆地南北任眠東西隨睡轟雷掣電泰山摧萬丈海水空裏墜驪龍叫感鬼神驚臣當恁時正鼾睡閑想張良悶思范蠡說甚曹操休言劉備兩三箇君子只爭些小閑氣爭似臣向清風嶺頭白雲堆裏展放眉頭解開肚皮打一覺睡更管甚紅輪西墜後又口號云問君世上何事好無過曉起睡當早庵前亂草結成衣飢餐松栢常令飽因翫山石脚絆倒不能起得睡到曉時人盡道臣憨癡臣自憨癡無煩惱先生初在周顯德中人訪其居窺其户間然惟獸跡鳥聲而已有樵於山麓者見其遺骸塵翳迫而視之乃先生也捫其心獨暖良乆氣還而起曰睡適酣矣奚爲擾我州將羅彦威以聞太宗知先生堅辭不仕欲求還山帝命百工聚集貨物於玉門前歌呼喧鬧以誇萬民之富庶約先生登翫謂先生曰京師豐盛若是安忍棄寡人還山不同治世乎先生曰鳥獸棲於林麓魚鱉游于江湖各有所樂耳太宗指示人烟輳集處問先生曰見否曰見帝曰見甚先生曰見富者貪生貧者競命太宗默然須臾下玉門還殿詰朝先生入内堅辭還山帝懇求濟世安民之術先生不免索紙筆書四字遠近輕重帝不諭其意先生解之曰遠者遠招賢士近者近去佞臣輕者輕賦萬民重者重賞三軍帝聽罷大悅上知其不可留即賜宴便殿詔宰臣兩禁赴宴賦詩以寵其行又詔華州刺史王祚時就存問以廩其闕由是海内無賢不肖聞其風而慕之其願操几杖以師事之者不可勝數將出京師先生賦辭朝詩云十年蹤跡踏紅塵爲憶青山入夢頻紫陌縱榮爭及睡朱門雖貴不如貧愁聞劍戟扶危主悶聽笙歌聒醉人携取舊書歸舊隱野花啼鳥一般春太宗爲先生堅要還山不能苦留上賜龜鶴鞍馬等物餘重物堅辭不受惟茶藥而已令使臣以安車送先生至華山雲臺觀賜號希夷詔曰賜詔陳摶一代高人累朝逋客慕我隆平之化來修觀謁之儀不有嘉名何彰貞範宜賜號希夷先生先生臨别留詩一絶云華山高處是吾宫出即凌空跨曉風臺殿不將金鎖閉來時自有白雲封太平興國初太宗差天使持詩再召先生辭謝不起先生密陳天命實在章聖御詩曰曾向前朝出白雲後來消息杳無聞如今若肯隨徴詔總把三峯乞與君先生竟辭不至帝令使臣賜二女與先生以備執巾櫛先生却之回詩曰雪爲肌體玉爲腮深謝君王送到來處士不生巫峽夢虚勞雲雨下陽臺一說唐僖宗封爲清虚處士仍賜宫女三人以備洒掃故賦詩云太宗賜希夷先生詔勑華山道士陳摶混跡寰中棲心物外養太素浩然之氣應少徴處士之星既不屈於王侯但守志於林壑樂我中和之化慶予下武之期而能遠涉川途暫來城闕浹旬延遇弘溢居多白雲莫駐於帝鄉好爵難縻於達士昔唐堯之至聖有巢由爲外臣朕雖寡薄庶遵前事或恐山中所闕已令華州刺史王祚每事供須乍返故山履兹春序緬懷高尚當適所宜故兹撫問想宜知悉春寒汝比好否遣書指不多及賜茶絹詔曰勑朕居九五之尊雖數年用兵而一心利物乃者鸞旌南狩江表來庭款誠屢罄於軍前方物咸陳於闕下既能效順遂命班師以汝早棄塵寰高居物外自得逍遥之趣不驚寵辱之心鎮彼囂浮有足嘉尚俾均賜賫用奬隱淪今賜汝云云河潼氣爽蓮嶽地靈攝道知方諒多休祉臨軒翹矚寤思在懷想宜知悉夏熱汝比好否遣書指不多及賜汝細白絹三十匹蠟面茶一十斤研膏茶二十斤鴉山茶二十斤詔至可領也先生嘗立於庭間見金人持劍呼曰子道成矣當有歸成之地蓋秋爲萬物之所歛而歸者也吾其隱於西方乎是時年已七十餘遂抵華山得古雲臺觀故基闢荆榛而居之以契歸成之語著三峯寓言五十首時境内有虎食人先生至其處叱虎令去自是虎不爲害雍熙中先生因吟望仙掌坐對瀑流指隙地曰此北極之舊地也吾嘗夜見神人衣黑衣頂冠掌中有朱書字示吾其文曰此極開同紫徴帝君之殿先生因曰開同者因天地而生故爲北辰也乃命弟子搆之侯璨張觀將舉進士以問先生曰侯張二生今年登科不如來年是年春省黜其名明年中第皆如其言大華希夷志卷上
