  text: 太華希夷志卷下帝九
  hash: sha256:d42fca9ee06510788f70178f300cc186f4adb69f91f13bd73229107aebfa4522
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0318_HFL_002-001a, image: hfl/0160/0160-038.png}
body:
  text: 登仕郎河中府知事訥齋張輅纂集補撰初張忠定公乖崖詠謁華山陳圖南欲同隱華山希夷曰他人即不可如公者吾當分一半相奉然公有官職未可議此如失火家待公救豈可不赴也公别摶摶以宣毫十枝白雲臺墨一劑蜀箋一角為贈公謂摶曰會得先生意驅詠入鬧處去曰珍重珍重摶送公回謂弟了曰斯人無情於物達則為公卿不達為帥乃贈詩一絶云征吳入蜀是尋常歌舞筵中救火忙乞得金陵間養老也須憂恤鬢邊蒼公始不諭其意後更鎮西蜀馳驛過華陰不暇與希夷相見寄詩與先生曰性愚不肯林泉住剛欲清流擬置君今日星馳劍南去回頭慚愧華山雲後公西蜀回有詩云世人大抵重官榮見我東歸夾道迎應被華山高士笑天真喪盡得浮名公晚年有瘡發於鬢治久不差遂自請金陵養老以鬢瘡卒果如其言錢文禧公若水少謁希夷求相邀入山齋地爐畔見老僧擁壞衲瞑目附火錢揖之僧微開目而已良久希夷問曰如何僧擺頭曰無此等骨後見希夷曰吾始見子神貌清粹謂子可學神仙而此僧言子無仙骨但可作貴公卿耳錢曰其僧何人耶希夷曰麻衣道者聞見録一説若水為舉子時見希夷於華山希夷曰明日當再來若水如期往見有一老僧與希夷擁地爐坐僧熟視若水久之不語以火箸畫灰作做不得三字徐曰急流中湧退人也若水辭去希夷不復留後若水登科為樞密副使年才四十致仕希夷初謂若水有仙風道骨意未決命僧觀之做不得故不復留然急流中湧退去神仙不遠矣僧麻衣道者也華陽隱士李琪自言唐開元中郎官人罕有見者關中逸人吕洞賔有劍術雖數百里頃刻輒至世以為神仙數至希夷齋館與之唱酬如交友時人異之此皆舊史之丈也陳堯佐知華州一日謁希夷先生坐定與語少頃有一道士風姿英爽目如點漆真神仙中人也徑入坐次希夷急避尊位略話數語皆方外之事須臾豹囊中取棗一枚與堯佐却而不受希夷起接啖之不久辭去送於觀外復會坐堯佐曰此何人希夷曰即洞賔也堯佐悔愕不已清源王世則等同詣先生世則為僕隸拜於階下先生笑而降階曰侮人者自侮也揖世則坐諸生之右曰將來君冠諸公明年世則果第一人及第一日先生自言嘗遇高士孫君仿𪋛皮處士二人語余曰武當山九室巖可以隱居因往棲焉許諫議仲宣罷成都牧過其廬先生曰非久再當補外尋遷給事中尹河南踰年入覲又遣人致書幣以問休咎謂門人賈德升曰為我答書給事此去更不出矣未幾果卒郭沆者少居華陰嘗宿觀下中夜先生呼令趣歸沆憚其遠不欲去先生與之俱往行一二里有人號呼以報母卒沆始悟先生遺藥急去可救既至果卒餌其藥遂愈齋中有大瓢挂壁上有道士賈休復欲之未敢言希夷謂之曰子來非有他意蓋欲吾瓢耳命侍者取而與之种放字明逸隱居終南豹林谷聞先生之風往見之先生一日令灑掃庭除有佳客至明逸果至作樵夫拜庭下希夷挽之而上曰君豈樵夫者後當有顯官聲名聞天下明逸曰放以道義來官祿非所問也希夷笑曰人之貴賤莫不有命君骨相當耳雖晦山林恐不能安異日自知之後真宗朝召為司諫帝携其手登龍圖閣論天下事辭歸山拜諫議大夫後改工部侍郎又謂明逸曰君不娶可得中壽明逸從之至六十歲卒先是希夷為明逸卜上世葬地於豹林谷下不定穴既葬希夷見之言地固佳安穴稍後世世當出名將明逸不娶無子自其姪衡至今為將帥有聲後希夷解化明逸立碑敘希夷之學曰皇王帝伯之道云希夷先生有高識嘗誡某曰子他日遭逢明主不假取迹動天闕名馳寰海名者古今之美器造物者深忌之天地間無完名子名將起必有物敗可戒之放晚節侈飾過度營産滿豐鎬間門人戚屬亦怙勢強併歲入益厚遂喪清節時王嗣宗守京兆醉慢罵條奏於朝會赦方止祥符八年一旦山齋起服聚諸生列飲取平生文藁悉焚之酒數行而逝亦竒男子希夷先生好讀易以數學授穆修伯長修授李之才挺之挺之授康節邵堯夫堯夫以象授种放放授蘆江許堅堅授范諤昌一枝傳於南方也世但以為神仙術善人倫風鑒而已非知希夷先生也先生忽謂弟子賈德升曰今日有佳客至當速見報少頃一人衣短褐青巾扣門賈未及報其人忽爾而去先生遽出追之一里餘遇老人衣鹿皮因問曰前去遠否老人曰此神仙李八百也動則八百里又悟鹿衣者乃太清得道白鹿先生也李即不及而鹿衣者亦失所在希夷先生曰吾不久留此世矣端拱初語門人曰吾來歲中元後當遊峨眉使晝夜然燭於石室中弟子等恭受文翰虔奉約束皆鳴咽流涕先生曰無亂尓情以怛我化也先生臨卒草奏疏人莫見其言遣弟子賈德升持所賜龜鶴並青鬃馬詣闕以進上獨覽久之以所獻物復賜德升仍加紫服號曰悟真先生希夷端拱初命德升曰汝可於張超谷鑿石為室二年七月初室成先生乃欣然策馬徑造其谷至盤石磽確處捨馬而徒攀藤引蘿暮抵其室大笑數四謂弟子曰才巖太華氣清景秀吾之所歸乎即書數百言為表其略曰大數有終聖朝難戀已於今月二十二日化形於蓮華峰下張超谷中至期以燭及夕命滅之令弟子各休息既曙則以左手支頤而終壽一百一十八歲經七日肢體猶溫有五色雲蔽塞洞口纍日不散後有中使至峨眉有客入謁衣冠甚偉自稱東明專相多説華山事後方悟華山陳先生遽令召之不知所往自號扶搖子其先生門弟子並高人勝士同至者咸録於後以激勵後學云晦庵先生通爐綱目曰周世宗召華山隱士陳摶詣闕問以飛升黃白之術對曰陛下為天子當以治天下為務安用此乎乃遣還山詔州縣長吏常存問之胡氏曰陳摶所藴非世宗所知也飛升黃白之問不亦陋乎摶以治天下對已發其端世宗不能訪以治道也先生披荆榛築室於上方太平興國中太宗纍賜詔齎御詩召摶赴闕乃敕有司增積隱廬復給內府金錢經始壇殿規模方備今觀是也先生著指玄篇八十章入室還丹詩五十首又作釣潭集萬餘字皆覼縷道妙包括至真其言簡而理深使觀者有所自得先生啓沃上意幽贊遠圖太宗欲以為諫議大夫先生懇辭命遂不下委化之年蓋百一十八歲自謂先機逆數知來識往精徴深妙殆不可測至諸竒説眩曜之事則未嘗為也故先生之道浩然莫得而揭厲之者無賢愚貴賤莫不聞其風而悅之先生沒後有弟子曾孫武尊師因文正范公指教得入室還丹詩於京師凝真院得三峰寓言於太華李寧處士得指玄篇於赤城張無夢得釣潭集於張中庸進士共三百篇餘乃纂先生傳集並養生要旨及李真人服餌法御賜詩曰只向身邊有大還胎神月殿在秋天三靈密象誰分别尸質清虛本自然又御賜篆明堂及飛白清靜二字真宗祀汾陰駐蹕華陰再幸雲臺閲先生遺像佇立凝思久之命除其觀田租召對道士武子華等賜紫服張方平往來秦蜀恭謁神御既而瞻禮希夷推神仙者之云蓋神本無方道無不在神也者妙萬物而為言者也惟神也故不疾而速不行而至漠然與合謂至人由是後可以出死生而窮變化至于一氣返復之元本四象自然之體用措玄理精婉已成章彼九室下方豈徒與麋鹿為群木石為伍而已哉先生紫胞緑絡眉目偉異方瞳粹音九流百氏之學咸徹視洞觀先生之道窈乎其深而不可窮恍乎其變而不可測固將乘雲氣騎日月以遊乎四海之外豈與眩竒怪尚詭譎以欺世取譽者同年而語哉种放以處士召見拜諫官真宗待以殊禮名動海內後請歸終南山恃恩驕倨甚王嗣宗知長安放至通判以下群拜謁放小俯垂手接之而已嗣宗內不平放召其姪出拜嗣宗坐受之放怒嗣宗曰曩者通判以下拜君君扶之此白丁耳嗣宗狀元及第名位不輕胡為不得坐受其拜放曰君以手搏得狀元何足道也嗣宗怒遂上疏言放才識無以踰人專飾詐巧盜虛名陛下尊禮擢為顯官恐天下竊笑益長澆偽之風且陛下召魏野野閉門避匿而放陰結權貴以自薦達因扶擲言放陰事數條上雖兩不問待放之意寢衰种放别業在終南山後生徒學者甚衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開圖召輔臣觀焉上歎賞之其後甘棠魏野居有幽致帝以遣人圖之故野有詩曰穆修伯長汶陽人後居蔡州師圖南修少豪爽性褊少合多遊京洛間人嘗書其詩句于禁中壁間真宗見之深加歎賞問侍臣曰此為誰詩或以穆修對上曰有文如是公卿何不薦丁晉公在側曰此人行不及言由是上不復問蓋伯長與晉公有布衣舊晉公頃赴夔漕伯長猶未仕相遇漢上晉公意欲伯長先致其禮伯長竟不一揖而去晉公憾之由是短於上前後晉公貶朱崖途道州伯長詩曰却訝有虞刑政失四凶何事不移量可見其不相善也伯長祥符二年梁固榜登進士及第調海州理椽以忤通判遂為削籍隸池州其集中秋浦會遇詩自敘其詳後遇赦署穎州文學參軍故當時呼之曰穆參軍老益貧家有唐本韓柳集乃丐於親厚者得金募工鏤板印數百帙携入京師相國寺設肆鬻之伯長坐其傍有儒生數輩至其肆輒取閲伯長奪取怒視謂曰先輩能讀一篇不失一字當以一部為贈自是經年不售學者方從事聲律未知為古文伯長首為之倡其後尹源子漸洙師魯兄弟始從之學古文又傳其春秋學李之才字挺之青州人倜儻不群師事伯長性嚴急稍不如意或至呵叱挺之左右承順如事父兄略無倦意登科任孟州司户挺之坦率不事儀矩時太守范忠獻公以此頗不悅挺之自若也後忠獻建節移鎮延安郡僚多送至境外挺之但别於近郊衆或讓之挺之曰異時送太守至如是且情貴稱禮范公實不我知而出疆遠送非情豈敢不情事范公未幾忠獻謫守安陸過洛三城故吏無一人往者獨挺之往省之忠獻始稱歎遂受知焉邵堯夫子某云挺之嘗為共城令屬衛州時先君康節居祖母喪築室蘇門山百源之上布衣疏食三年躬爨以養先祖挺之聞先君好學苦志自造其廬問先君曰為科舉進取之學耳挺之曰科舉之外有義理之學子知之乎先君曰未也願受教挺之曰義理之外有物理之學子知之乎先君曰未也願受教挺之曰物理之外有性命之學子知之乎先君曰未也願受教於是先君傳其學挺之後終殿中丞簽書澤州判官廳公事澤人劉義叟晚出其門受曆法以為名士易學則惟先君得之也康節少時自雄其才慷慨有大志既學力慕高遠謂先王之事為可必致及其學益老德益邵玩心高明觀於天地之運化陰陽之消長以達乎萬物之變然後頽然其順浩然其歸在洛三十年始至蓬草環堵不蔽風雨躬爨以養其父母居之裕如講學於家未嘗強以語人而就問者日衆鄉里化之遠近尊之士人之道洛者有不之公府而必之先生之廬先生德氣粹然與人言必依於仁義忠信樂道人之善而未嘗及其惡故賢者悅其德不賢者服其化所以厚風俗成人材者先生之功多矣先生之學得之於李挺之挺之得之於穆伯長推其源流遠有端緒而先生淳一不雜汪洋浩大其所自得者多矣受命不起以詩答鄉人平生不作皺眉事天下應無切齒人斷送落花安用兩裝添舊物豈須春幸逢堯舜為真主且放巢由作外臣六十病夫宜揣分監司無用苦開陳張師正年五十齒巳踈搖後十餘年臣臠大胾利若刀截嘗得樂方敘曰元亨在天聖中登嶽頂至明星館故基下得斷碑䰓佛有古文乃治口齒鳥髭藥方歌一首豬方皂角及生薑西圍升麻蜀地黃木律旱蓮槐角子細辛荷蒂剪荷紫心子也要相當貴鹽等分同燒煅研細將來使最良揩齒牢牙髭鬢黑誰知世上有仙方此希夷先生之方也處士魏野之勝好彈琴作詩清苦多聞於時前後郡守皆所禮遇上祀汾陰過其廬遙望魏野松下教鶴舞真宗曰寡人須到此中使報之將近魏野携琴引鶴踰垣而去駕至山庵不遇隨書於門曰朕與寇準同來後使人召之辭疾不至野以詩贄寇公曰從前輔相皆頻出獨在中書十五秋泰嶽汾陰俱禮畢這回好伴赤松遊公覽之喜形於色以酒茗藥物為答素編云先公遺札有公自寫此詩數本旦得詩感悟以疾屢辭攺柄遂拜太尉玉清昭應使王文正遺事魏野謂寇準曰自古功名蓋世少有全者因與詩曰好去上天辭宮貴却來平地作神仙公及貶始悔不用野之言溫公集言野之子名關亦不仕皇祐中賜清逸處士號出歸回歸太華希夷志卷下
