body:
  text: 太華希夷志序帝八愚除晉寧河中府之幕職密邇華山稔聞希夷先生遺事公務之暇采古書所録或諺語之談其高風峻節信乎前宋一代之異人也故作太華希夷志以紀之先生明易深造玄妙之理視人之禍福物之休咎其應有如蓍龜當五代之時有撥亂濟世之志所學得皇王帝伯之道聞宋太祖登極知天下已定遂入華山為道士徴召不至及太宗即位三宣至闕下待以賔禮賜坐與語所論事之凶吉靡不徴驗欲拜官堅辭弗受不久放還山迹雖方外之士吻合中庸之道其脫落塵世泥滓軒冕傲睨公侯視萬乘若僚友恬退高隱不尚勢利足抑奔競之流可追配巢由嚴陵之節其崇名教厚風俗以助萬一云回顧吮癰舐痔奴顔婢膝昏暮扣人之門户驕人於白日者猶醬瓿之醯雞奚足論哉輅遠居保郡官除蒲川為家貧不免二千里來之任初兩任教官連仕縣職館閣名公巨儒纍舉詞翰之選當路齟齬不果用僕恥於奔競故碌碌居州縣之職以代耕未能展平生讀書之志恆鬱鬱不遂因閲古傳記感希夷先生之高節編次成一書俾新學之士激勵其志內有差訛鄙俗傳者之誤志其固陋就撰以補綴之以寫高遠之趣庶幾有取焉延祐甲寅秋七月己未日訥齋張輅序
